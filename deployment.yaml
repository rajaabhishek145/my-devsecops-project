apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-devsecops-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-devsecops-app
  template:
    metadata:
      labels:
        app: my-devsecops-app
    spec:
      containers:
        - name: my-devsecops-container
          image: abhi9805/my-devsecops-project:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000